<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>专业 Markdown & LaTeX 排版工具</title>
    
    <!-- 引入 Tailwind CSS 进行 UI 布局 -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 引入 Marked.js 解析 Markdown -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <!-- 引入 KaTeX 解析 LaTeX 公式 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>

    <!-- 新增：引入 html2pdf.js 作为在线沙盒环境的备用导出方案 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        /* 动态注入的排版样式 */
        :root {
            --paper-font-size: 16px;
            --paper-line-height: 1.8;
            --paper-letter-spacing: 0px;
            --paper-font-family: 'Georgia', serif;
            --paper-margin-top: 20mm;
            --paper-margin-bottom: 20mm;
            --paper-margin-left: 20mm;
            --paper-margin-right: 20mm;
        }

        /* 屏幕预览下的纸张效果 */
        #paper-container {
            width: 210mm; /* A4 宽度 */
            min-height: 297mm; /* A4 最小高度 */
            background: white;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            margin: 2rem auto;
            padding: var(--paper-margin-top) var(--paper-margin-right) var(--paper-margin-bottom) var(--paper-margin-left);
            box-sizing: border-box;
            
            font-size: var(--paper-font-size);
            line-height: var(--paper-line-height);
            letter-spacing: var(--paper-letter-spacing);
            font-family: var(--paper-font-family);
            color: #1a1a1a;
        }

        /* Markdown 内容的一些基础美化 */
        #paper-container h1 { font-size: 2.2em; font-weight: bold; margin-bottom: 1em; text-align: center; border-bottom: 1px solid #eaecef; padding-bottom: 0.3em; }
        #paper-container h2 { font-size: 1.5em; font-weight: bold; margin-top: 1.5em; margin-bottom: 0.8em; }
        #paper-container h3 { font-size: 1.25em; font-weight: bold; margin-top: 1.2em; margin-bottom: 0.6em; }
        #paper-container p { margin-bottom: 1em; text-align: justify; }
        #paper-container ul { list-style-type: disc; margin-left: 2em; margin-bottom: 1em; }
        #paper-container ol { list-style-type: decimal; margin-left: 2em; margin-bottom: 1em; }
        #paper-container blockquote { border-left: 4px solid #dfe2e5; padding-left: 1em; color: #6a737d; margin-bottom: 1em; }
        #paper-container code { background-color: rgba(27,31,35,0.05); padding: 0.2em 0.4em; border-radius: 3px; font-family: monospace; font-size: 0.9em; }
        #paper-container pre { background-color: #f6f8fa; padding: 1em; overflow: auto; border-radius: 3px; margin-bottom: 1em; }
        #paper-container pre code { background-color: transparent; padding: 0; }

        /* KaTeX 公式自适应溢出处理 */
        .katex-display { overflow-x: auto; overflow-y: hidden; padding-top: 0.5em; padding-bottom: 0.5em; }

        /* ====== 打印核心规则 (专业级) ====== */
        @media print {
            /* 隐藏控制面板和背景 */
            body { background-color: white !important; }
            #sidebar { display: none !important; }
            #preview-wrapper { margin: 0 !important; padding: 0 !important; height: auto !important; overflow: visible !important; }
            
            /* 移除预览区的纸张阴影和边距模拟，让浏览器底层接管 */
            #paper-container { 
                box-shadow: none !important; 
                margin: 0 !important; 
                padding: 0 !important; 
                width: 100% !important; 
                min-height: auto !important; 
            }

            /* 利用动态 style 标签覆盖 @page 规则以实现硬件级物理页边距 */
        }
    </style>
</head>
<body class="bg-gray-100 flex h-screen overflow-hidden text-sm">

    <!-- 左侧控制面板 -->
    <aside id="sidebar" class="w-96 bg-white shadow-xl flex flex-col z-10 border-r border-gray-200 shrink-0 h-full">
        <div class="p-4 border-b border-gray-100 flex justify-between items-center bg-gray-50">
            <h2 class="text-lg font-bold text-gray-800 tracking-wide">高级排版工具</h2>
            <div class="flex gap-2">
                <button onclick="downloadHtml()" class="bg-gray-500 hover:bg-gray-600 text-white px-3 py-2 rounded shadow transition text-xs font-medium" title="下载网页到本地运行，可解锁浏览器无损原生打印">
                    ⬇️ 存为本地版(推荐)
                </button>
                <button id="export-btn" onclick="exportPDF()" class="bg-blue-600 hover:bg-blue-700 text-white px-3 py-2 rounded shadow transition text-xs font-medium">
                    导出 PDF
                </button>
            </div>
        </div>

        <div class="flex-1 overflow-y-auto p-5 space-y-6">
            
            <!-- 内容输入区 -->
            <div class="space-y-2">
                <label class="font-bold text-gray-700 flex items-center justify-between">
                    <span>文档内容 (Markdown + LaTeX)</span>
                </label>
                <textarea id="editor" class="w-full h-64 p-3 border border-gray-300 rounded focus:ring-2 focus:ring-blue-500 focus:outline-none resize-y font-mono text-xs leading-relaxed" placeholder="在此输入内容..."></textarea>
            </div>

            <hr class="border-gray-100">

            <!-- 排版参数控制 -->
            <div class="space-y-5">
                <h3 class="font-bold text-gray-700 flex items-center gap-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4"></path></svg>
                    排版参数调整
                </h3>

                <!-- 字体选择 -->
                <div>
                    <label class="block text-gray-600 mb-1">字体样式</label>
                    <select id="font-family" class="w-full border border-gray-300 rounded p-2 focus:ring-2 focus:ring-blue-500 outline-none" onchange="updateStyles()">
                        <option value="'Georgia', 'Times New Roman', serif">衬线体 (适合学术/阅读)</option>
                        <option value="'Helvetica Neue', Helvetica, Arial, sans-serif">无衬线体 (现代/清爽)</option>
                        <option value="'Courier New', Courier, monospace">等宽字体 (代码/草稿)</option>
                    </select>
                </div>

                <!-- 字体大小 -->
                <div>
                    <div class="flex justify-between text-gray-600 mb-1">
                        <label>字体大小</label>
                        <span id="font-size-val">16px</span>
                    </div>
                    <input type="range" id="font-size" min="10" max="36" value="16" class="w-full" oninput="updateStyles()">
                </div>

                <!-- 行间距 -->
                <div>
                    <div class="flex justify-between text-gray-600 mb-1">
                        <label>行间距</label>
                        <span id="line-height-val">1.8</span>
                    </div>
                    <input type="range" id="line-height" min="1" max="3" step="0.1" value="1.8" class="w-full" oninput="updateStyles()">
                </div>

                <!-- 字体间距 -->
                <div>
                    <div class="flex justify-between text-gray-600 mb-1">
                        <label>字体间距</label>
                        <span id="letter-spacing-val">0px</span>
                    </div>
                    <input type="range" id="letter-spacing" min="-2" max="10" step="0.5" value="0" class="w-full" oninput="updateStyles()">
                </div>

                <hr class="border-gray-100">
                <h3 class="font-bold text-gray-700">页边距 (毫米 mm)</h3>

                <div class="grid grid-cols-2 gap-4">
                    <!-- 上边距 -->
                    <div>
                        <div class="flex justify-between text-gray-600 mb-1 text-xs">
                            <label>上边距</label><span id="margin-top-val">25mm</span>
                        </div>
                        <input type="range" id="margin-top" min="0" max="50" value="25" class="w-full" oninput="updateStyles()">
                    </div>
                    <!-- 下边距 -->
                    <div>
                        <div class="flex justify-between text-gray-600 mb-1 text-xs">
                            <label>下边距</label><span id="margin-bottom-val">25mm</span>
                        </div>
                        <input type="range" id="margin-bottom" min="0" max="50" value="25" class="w-full" oninput="updateStyles()">
                    </div>
                    <!-- 左边距 -->
                    <div>
                        <div class="flex justify-between text-gray-600 mb-1 text-xs">
                            <label>左边距</label><span id="margin-left-val">25mm</span>
                        </div>
                        <input type="range" id="margin-left" min="0" max="50" value="25" class="w-full" oninput="updateStyles()">
                    </div>
                    <!-- 右边距 -->
                    <div>
                        <div class="flex justify-between text-gray-600 mb-1 text-xs">
                            <label>右边距</label><span id="margin-right-val">25mm</span>
                        </div>
                        <input type="range" id="margin-right" min="0" max="50" value="25" class="w-full" oninput="updateStyles()">
                    </div>
                </div>
            </div>
        </div>
    </aside>

    <!-- 右侧预览区 -->
    <main id="preview-wrapper" class="flex-1 overflow-y-auto bg-gray-200 relative">
        <div id="paper-container">
            <!-- 渲染结果将注入此处 -->
        </div>
    </main>

    <!-- 用于动态覆盖打印 @page 参数的样式标签 -->
    <style id="print-page-style"></style>

    <script>
        // 设置 Marked.js 的选项
        marked.setOptions({
            breaks: true, // 支持回车换行
            gfm: true     // GitHub Flavored Markdown
        });

        // 默认测试文本
        const defaultText = `# 自动排版与 LaTeX 渲染测试

这是一段用于测试排版的段落。作为一位严谨的研究者，我们必须确保所有的细节都能被准确无误地渲染。通过调整左侧的面板，您可以实时预览字体大小、行距以及页边距的变化。

## 1. 数学公式排版 (LaTeX)

我们采用先分离 LaTeX 再解析 Markdown 的混合策略，以防止下划线 \`_\` 或星号 \`*\` 被误判为倾斜或粗体。

这里是行内公式测试：著名的质能方程 $E = mc^2$，以及被誉为最美公式的欧拉公式 $e^{i\\pi} + 1 = 0$。它们应该完美地融入文本基线中。

下面是一个块级公式测试（展示模式）：

$$
f(x) = \\int_{-\\infty}^{\\infty} \\hat{f}(\\xi)\\,e^{2 \\pi i \\xi x} \\,d\\xi
$$

并且支持复杂的矩阵与求和符号排版：

$$
\\mathbf{V}_1 \\times \\mathbf{V}_2 =  \\begin{vmatrix}
\\mathbf{i} & \\mathbf{j} & \\mathbf{k} \\\\
\\frac{\\partial X}{\\partial u} &  \\frac{\\partial Y}{\\partial u} & 0 \\\\
\\frac{\\partial X}{\\partial v} &  \\frac{\\partial Y}{\\partial v} & 0
\\end{vmatrix}
$$

## 2. 文本格式与层级测试

* **粗体文本** 用来强调关键信息。
* *斜体文本* 常用于外来词或特殊名词。
* 您可以添加 [超链接](https://google.com) 指向参考文献。

### 导出提示
> 当您调整完毕后，点击右上角的“导出 PDF”。
> 系统会唤起浏览器的**打印对话框**。请在打印设置中将“目标打印机”选为**另存为 PDF**，并确保“边距”设置为**默认**（因为我们已通过代码精确注入了您的页边距设置）。
`;

        const editor = document.getElementById('editor');
        const paper = document.getElementById('paper-container');
        const printPageStyle = document.getElementById('print-page-style');

        // 初始化编辑器
        editor.value = defaultText;

        /**
         * 核心解析引擎：精准分离数学公式和 Markdown
         * 避免 Markdown 引擎破坏 LaTeX 内部的 _ 和 * 符号
         */
        function parseAndRender(text) {
            // 如果还未加载完 KaTeX，则延迟重试
            if (typeof katex === 'undefined') {
                setTimeout(() => parseAndRender(text), 100);
                return;
            }

            const mathBlocks = [];
            
            // 1. 提取块级公式 $$...$$
            let processedText = text.replace(/\$\$(.*?)\$\$/gs, (match, p1) => {
                mathBlocks.push({ type: 'display', math: p1 });
                return `%%%MATH_BLOCK_${mathBlocks.length - 1}%%%`;
            });

            // 2. 提取行内公式 $...$ (使用负向先行断言排除被转义的 \$)
            processedText = processedText.replace(/(?<!\\)\$(.+?)(?<!\\)\$/g, (match, p1) => {
                mathBlocks.push({ type: 'inline', math: p1 });
                return `%%%MATH_INLINE_${mathBlocks.length - 1}%%%`;
            });

            // 3. 将保护后的文本交给 Marked 解析
            let html = marked.parse(processedText);

            // 4. 将数学公式坑位替换为真正的 KaTeX 渲染结果
            html = html.replace(/%%%MATH_BLOCK_(\d+)%%%/g, (match, index) => {
                try {
                    return katex.renderToString(mathBlocks[index].math, { displayMode: true, throwOnError: false });
                } catch (e) {
                    return `<div style="color:red; border:1px solid red; padding:5px;">公式错误: ${e.message}</div>`;
                }
            });

            html = html.replace(/%%%MATH_INLINE_(\d+)%%%/g, (match, index) => {
                try {
                    return katex.renderToString(mathBlocks[index].math, { displayMode: false, throwOnError: false });
                } catch (e) {
                    return `<span style="color:red;">[公式错误: ${e.message}]</span>`;
                }
            });

            // 5. 注入到视图
            paper.innerHTML = html;
        }

        // 防抖函数，避免输入时卡顿
        let timeout;
        editor.addEventListener('input', () => {
            clearTimeout(timeout);
            timeout = setTimeout(() => {
                parseAndRender(editor.value);
            }, 300);
        });

        /**
         * 实时更新 CSS 变量及打印的 @page 边距
         */
        function updateStyles() {
            // 获取值
            const fontSize = document.getElementById('font-size').value;
            const lineHeight = document.getElementById('line-height').value;
            const letterSpacing = document.getElementById('letter-spacing').value;
            const fontFamily = document.getElementById('font-family').value;
            
            const mt = document.getElementById('margin-top').value;
            const mb = document.getElementById('margin-bottom').value;
            const ml = document.getElementById('margin-left').value;
            const mr = document.getElementById('margin-right').value;

            // 更新 UI 标签
            document.getElementById('font-size-val').innerText = fontSize + 'px';
            document.getElementById('line-height-val').innerText = lineHeight;
            document.getElementById('letter-spacing-val').innerText = letterSpacing + 'px';
            document.getElementById('margin-top-val').innerText = mt + 'mm';
            document.getElementById('margin-bottom-val').innerText = mb + 'mm';
            document.getElementById('margin-left-val').innerText = ml + 'mm';
            document.getElementById('margin-right-val').innerText = mr + 'mm';

            // 更新 CSS 变量 (屏幕预览用)
            document.documentElement.style.setProperty('--paper-font-size', `${fontSize}px`);
            document.documentElement.style.setProperty('--paper-line-height', lineHeight);
            document.documentElement.style.setProperty('--paper-letter-spacing', `${letterSpacing}px`);
            document.documentElement.style.setProperty('--paper-font-family', fontFamily);
            document.documentElement.style.setProperty('--paper-margin-top', `${mt}mm`);
            document.documentElement.style.setProperty('--paper-margin-bottom', `${mb}mm`);
            document.documentElement.style.setProperty('--paper-margin-left', `${ml}mm`);
            document.documentElement.style.setProperty('--paper-margin-right', `${mr}mm`);

            // ★ 核心：注入物理打印边距
            // 当触发 window.print() 时，浏览器会读取这里的 @page margin，实现真正的分页
            printPageStyle.innerHTML = `
                @media print {
                    @page {
                        size: A4;
                        margin: ${mt}mm ${mr}mm ${mb}mm ${ml}mm !important;
                    }
                }
            `;
        }

        /**
         * 导出 PDF：智能区分运行环境
         */
        function exportPDF() {
            const btn = document.getElementById('export-btn');
            const originalText = btn.innerHTML;
            btn.innerHTML = '生成中...';
            btn.disabled = true;

            // 检查是否被嵌入在 iframe 中 (当前网页的沙盒环境)
            if (window.self !== window.top) {
                // 在线沙盒环境中，window.print() 被拦截，启用 html2pdf 备用方案
                if (typeof html2pdf === 'undefined') {
                    alert('PDF引擎加载中，请稍后再试。');
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                    return;
                }

                const element = document.getElementById('paper-container');
                
                // 临时调整样式以适应 html2pdf 截图
                const originalBoxShadow = element.style.boxShadow;
                element.style.boxShadow = 'none';

                // 我们将 scale 调高到 4 以尽量减轻文字发虚的问题
                const opt = {
                    margin:       0,
                    filename:     'document.pdf',
                    image:        { type: 'jpeg', quality: 1 },
                    html2canvas:  { scale: 4, useCORS: true, letterRendering: true },
                    jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
                };

                html2pdf().set(opt).from(element).save().then(() => {
                    element.style.boxShadow = originalBoxShadow;
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                }).catch(err => {
                    console.error(err);
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                });
            } else {
                // 如果是本地直接打开的 HTML，使用最高质量的原生打印
                setTimeout(() => {
                    window.print();
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                }, 100);
            }
        }

        /**
         * 下载完整的 HTML 源码到本地
         */
        function downloadHtml() {
            // 将当前输入框的内容固化到 DOM 中，使下载的文件自带当前编辑的进度
            document.getElementById('editor').textContent = document.getElementById('editor').value;
            
            const htmlContent = "<!DOCTYPE html>\n" + document.documentElement.outerHTML;
            const blob = new Blob([htmlContent], { type: 'text/html;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            
            const a = document.createElement('a');
            a.href = url;
            a.download = 'Markdown排版工具_本地完整版.html';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        // 初始化执行一次
        window.addEventListener('DOMContentLoaded', () => {
            updateStyles();
            parseAndRender(editor.value);
        });
    </script>
</body>
</html>
