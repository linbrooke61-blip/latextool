<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>Markdown 排版工具 Ultimate</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body { margin:0; }

.page {
    width:210mm;
    height:297mm;
    margin:20px auto;
    background:white;
    padding:20mm;
    position:relative;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.content {
    font-size:16px;
    line-height:1.8;
}

.page-number {
    position:absolute;
    bottom:10mm;
    right:15mm;
    font-size:12px;
}

h1 { text-align:center; }
h2 { border-bottom:1px solid #ddd; padding-bottom:4px; }

</style>
</head>

<body class="flex h-screen">

<!-- Sidebar -->
<div class="w-80 border-r p-3 flex flex-col gap-2">
<textarea id="editor" class="flex-1 border p-2 text-xs font-mono"></textarea>

<button onclick="render()" class="bg-blue-500 text-white p-2">渲染</button>
<button onclick="exportPDF()" class="bg-green-600 text-white p-2">导出PDF</button>
</div>

<!-- Preview -->
<div id="preview" class="flex-1 overflow-auto bg-gray-200"></div>

<script>
const editor = document.getElementById("editor");

editor.value = `# 标题

## 第一章
这是正文。

$$E=mc^2$$

## 第二章
内容继续。

- 列表1
- 列表2
`;

function parse(md){
    let math = [];

    md = md.replace(/\$\$(.*?)\$\$/gs,(m,p)=>{
        math.push({t:p,b:true});
        return `@@${math.length-1}@@`;
    });

    md = md.replace(/\$(.*?)\$/g,(m,p)=>{
        math.push({t:p,b:false});
        return `@@${math.length-1}@@`;
    });

    let html = marked.parse(md);

    html = html.replace(/@@(\d+)@@/g,(m,i)=>{
        let item = math[i];
        return katex.renderToString(item.t,{
            displayMode:item.b,
            throwOnError:false,
            trust:false
        });
    });

    return html;
}

// 🔥 目录生成
function generateTOC(container){
    let toc = document.createElement("div");
    toc.innerHTML = "<h2>目录</h2>";

    container.querySelectorAll("h2").forEach((h,i)=>{
        h.id = "sec_"+i;

        let a = document.createElement("div");
        a.innerHTML = `<a href="#${h.id}">${h.innerText}</a>`;
        toc.appendChild(a);
    });

    return toc;
}

// 🔥 分页引擎（改进版）
function paginate(nodes){
    let pages = [];
    let page = createPage();
    let content = page.querySelector(".content");

    nodes.forEach(node=>{
        content.appendChild(node);

        if(content.scrollHeight > content.clientHeight){
            content.removeChild(node);

            pages.push(page);
            page = createPage();
            content = page.querySelector(".content");

            content.appendChild(node);
        }
    });

    pages.push(page);
    return pages;
}

function createPage(){
    let p = document.createElement("div");
    p.className = "page";

    let c = document.createElement("div");
    c.className = "content";

    p.appendChild(c);
    return p;
}

function render(){
    const preview = document.getElementById("preview");
    preview.innerHTML = "";

    let html = parse(editor.value);

    let temp = document.createElement("div");
    temp.innerHTML = html;

    // 插入目录
    let toc = generateTOC(temp);
    temp.insertBefore(toc, temp.firstChild);

    let nodes = Array.from(temp.children);

    let pages = paginate(nodes);

    pages.forEach((p,i)=>{
        let num = document.createElement("div");
        num.className = "page-number";
        num.innerText = i+1;
        p.appendChild(num);

        preview.appendChild(p);
    });
}

// PDF
async function exportPDF(){
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF('p','mm','a4');

    const pages = document.querySelectorAll('.page');

    for(let i=0;i<pages.length;i++){
        let canvas = await html2canvas(pages[i],{
            scale: window.devicePixelRatio * 2
        });

        let img = canvas.toDataURL("image/jpeg",1);

        if(i>0) pdf.addPage();
        pdf.addImage(img,'JPEG',0,0,210,297);
    }

    pdf.save("论文.pdf");
}

render();
</script>

</body>
</html>
