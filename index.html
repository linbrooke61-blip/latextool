<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markdown 排版工具1.0</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <!-- KaTeX -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>

    <!-- 引入 jsPDF 和 html2canvas 实现精准的逐页所见即所得导出 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        :root {
            --paper-font-size: 16px;
            --paper-line-height: 1.8;
            --paper-font-family: 'Times New Roman', 'Source Han Sans CN', serif;
            --paper-margin-top: 25mm;
            --paper-margin-bottom: 25mm;
            --paper-margin-left: 20mm;
            --paper-margin-right: 20mm;
        }

        /* 预览区背景设定 */
        #preview-wrapper {
            background-color: #e5e7eb; /* 灰色背景衬托白色纸张 */
        }

        /* 纸张容器变更为 Flex 布局，用于排列多张独立页面 */
        #paper-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2rem; /* 两张纸之间的视觉间距 */
            padding: 2rem 0; 
            width: 100%;
        }

        /* 独立的物理 A4 纸样式 */
        .a4-page {
            width: 210mm;
            height: 297mm;
            background: white;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            box-sizing: border-box;
            padding: var(--paper-margin-top) var(--paper-margin-right) var(--paper-margin-bottom) var(--paper-margin-left);
            overflow: hidden; /* 超出单页内容自动截断（由 JS 负责移交下一页） */
            flex-shrink: 0;
            position: relative;
            page-break-after: always; /* 确保打印时也是一页一页的 */
        }

        /* 页面内容区 */
        .page-content {
            width: 100%;
            height: 100%; /* 自动计算出剥离边距后的实际内容高度 */
            position: relative;
            font-size: var(--paper-font-size);
            line-height: var(--paper-line-height);
            font-family: var(--paper-font-family);
            color: #1a1a1a;
            word-wrap: break-word;
        }

        /* 极致顶部清理：确保每一页的开头绝对顶格 */
        .page-content > *:first-child { margin-top: 0 !important; padding-top: 0 !important; }

        /* 内容元素基础样式 */
        .page-content h1 { font-size: 2em; font-weight: bold; margin-bottom: 1em; text-align: center; }
        .page-content h2 { font-size: 1.5em; font-weight: bold; margin: 1.2em 0 0.6em 0; border-bottom: 1px solid #eee; padding-bottom: 3px; }
        .page-content p { margin-bottom: 0.8em; text-align: justify; }
        .page-content ul, .page-content ol { margin-bottom: 1em; padding-left: 2em; }
        .page-content li { margin-bottom: 0.3em; }
        .katex-display { margin: 1em 0; }

        /* 打印时去除阴影和间距 */
        @media print {
            body { background: white; }
            #sidebar { display: none !important; }
            #preview-wrapper { margin: 0 !important; padding: 0 !important; background-color: white; }
            #paper-container { gap: 0; padding: 0; }
            .a4-page { box-shadow: none; margin: 0; border: none; }
        }
    </style>
</head>
<body class="bg-gray-100 flex h-screen overflow-hidden text-sm">

    <!-- 左侧面板 -->
    <aside id="sidebar" class="w-96 bg-white shadow-xl flex flex-col z-10 border-r h-full">
        <div class="p-4 border-b bg-slate-50 flex flex-col gap-3">
            <h2 class="text-lg font-bold text-slate-800">排版与导出系统</h2>
            <div class="flex flex-wrap gap-2">
                <button onclick="downloadHtml()" class="bg-slate-500 hover:bg-slate-600 text-white px-3 py-1.5 rounded text-[11px] transition">本地版</button>
                <button onclick="exportDOCX()" class="bg-green-600 hover:bg-green-700 text-white px-3 py-1.5 rounded text-[11px] transition font-bold shadow-md">导出 Word (原生公式)</button>
                <button id="export-btn" onclick="exportPDF()" class="bg-blue-600 hover:bg-blue-700 text-white px-3 py-1.5 rounded text-[11px] transition font-bold">导出 PDF</button>
            </div>
        </div>

        <div class="flex-1 overflow-y-auto p-5 space-y-6">
            <div class="space-y-2">
                <label class="font-bold text-gray-700">内容输入</label>
                <textarea id="editor" class="w-full h-80 p-3 border rounded font-mono text-[11px] focus:ring-2 focus:ring-blue-500 outline-none" placeholder="输入 Markdown..."></textarea>
            </div>

            <div class="space-y-4">
                <h3 class="font-bold text-gray-700 text-xs uppercase">排版微调</h3>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[11px] text-gray-500">字号: <span id="font-size-val">16px</span></label>
                        <input type="range" id="font-size" min="12" max="24" value="16" class="w-full h-1" oninput="updateStyles()">
                    </div>
                    <div>
                        <label class="text-[11px] text-gray-500">行距: <span id="line-height-val">1.8</span></label>
                        <input type="range" id="line-height" min="1" max="2.5" step="0.1" value="1.8" class="w-full h-1" oninput="updateStyles()">
                    </div>
                </div>

                <div class="bg-slate-50 p-3 rounded border border-slate-100 space-y-3">
                    <p class="text-[10px] font-bold text-slate-400">页边距控制 (mm)</p>
                    <div class="grid grid-cols-2 gap-3">
                        <div><label class="text-[9px]">上</label><input type="number" id="margin-top" value="25" class="w-full border p-1 rounded" oninput="updateStyles()"></div>
                        <div><label class="text-[9px]">下</label><input type="number" id="margin-bottom" value="25" class="w-full border p-1 rounded" oninput="updateStyles()"></div>
                        <div><label class="text-[9px]">左</label><input type="number" id="margin-left" value="20" class="w-full border p-1 rounded" oninput="updateStyles()"></div>
                        <div><label class="text-[9px]">右</label><input type="number" id="margin-right" value="20" class="w-full border p-1 rounded" oninput="updateStyles()"></div>
                    </div>
                </div>
            </div>
        </div>
    </aside>

    <main id="preview-wrapper" class="flex-1 overflow-y-auto relative">
        <div id="paper-container"></div>
    </main>

    <style id="print-page-style"></style>

    <script>
        const editor = document.getElementById('editor');
        const printPageStyle = document.getElementById('print-page-style');
        
        let currentPage, contentArea;
        let renderTimeout;

        marked.setOptions({ breaks: true, gfm: true });

        editor.value = `# 物理分页预览测试\n\n你可以尝试不断向下输入内容，或者调整左侧的字号和行距。一旦当前页面的物理空间被填满，系统会自动生成一张带有阴影的全新 A4 纸。\n\n## 智能列表切分\n\n* 项目一：公式测试 $E = mc^2$\n* 项目二：这是长列表测试，当接近页尾时，列表项会被智能打断到下一页。\n* 项目三\n* 项目四\n* 项目五\n* 项目六\n* 项目七\n* 项目八\n\n$$ \\int_a^b f(x) dx = F(b) - F(a) $$\n\n正常段落测试。现在导出的 PDF 将会与您在这里看到的排版严丝合缝地对齐。`;

        /**
         * 动态生成一张新的 A4 纸张 DOM
         */
        function createNewPage() {
            const paperContainer = document.getElementById('paper-container');
            currentPage = document.createElement('div');
            currentPage.className = 'a4-page';
            
            contentArea = document.createElement('div');
            contentArea.className = 'page-content';
            currentPage.appendChild(contentArea);
            
            paperContainer.appendChild(currentPage);
        }

        /**
         * 智能装填算法：将节点逐个塞入纸张，超高则开新纸
         */
        function appendNodeToPages(node) {
            contentArea.appendChild(node);
            
            // 检查内容是否溢出了当前纸张的安全高度
            if (Math.ceil(contentArea.scrollHeight) > Math.ceil(contentArea.clientHeight) + 1) {
                
                // 智能处理列表 (UL/OL)：允许在列表项之间断页
                if ((node.tagName === 'UL' || node.tagName === 'OL') && node.childNodes.length > 1) {
                    contentArea.removeChild(node);
                    
                    let currentList = node.cloneNode(false);
                    contentArea.appendChild(currentList);
                    
                    const items = Array.from(node.childNodes);
                    for (let i = 0; i < items.length; i++) {
                        const item = items[i];
                        currentList.appendChild(item);
                        
                        if (Math.ceil(contentArea.scrollHeight) > Math.ceil(contentArea.clientHeight) + 1) {
                            currentList.removeChild(item);
                            if (currentList.childNodes.length === 0) contentArea.removeChild(currentList);
                            
                            createNewPage(); // 开启新一页
                            currentList = node.cloneNode(false);
                            contentArea.appendChild(currentList);
                            currentList.appendChild(item);
                        }
                    }
                } else {
                    // 普通块级元素
                    if (contentArea.childNodes.length === 1) {
                        // 只有一个超大元素，允许它溢出被截断，为后续元素开新页
                        createNewPage();
                    } else {
                        // 将该元素移至下一页
                        contentArea.removeChild(node);
                        createNewPage();
                        contentArea.appendChild(node);
                        // 如果它在新页依然超高，继续开新页保障后续流程
                        if (Math.ceil(contentArea.scrollHeight) > Math.ceil(contentArea.clientHeight) + 1) {
                            createNewPage();
                        }
                    }
                }
            }
        }

        /**
         * 核心解析与分页调度器
         */
        function parseAndRender(text) {
            if (typeof katex === 'undefined') return;
            
            let cleanText = text.replace(/^\s*\*\s+/gm, '* ');
            const mathBlocks = [];
            let processedText = cleanText.replace(/\$\$(.*?)\$\$/gs, (m, p1) => {
                mathBlocks.push({ math: p1, display: true });
                return `%%%MATH_${mathBlocks.length - 1}%%%`;
            });
            processedText = processedText.replace(/(?<!\\)\$(.+?)(?<!\\)\$/g, (m, p1) => {
                mathBlocks.push({ math: p1, display: false });
                return `%%%MATH_${mathBlocks.length - 1}%%%`;
            });

            let html = marked.parse(processedText);
            html = html.replace(/%%%MATH_(\d+)%%%/g, (m, i) => {
                const item = mathBlocks[i];
                return katex.renderToString(item.math, { displayMode: item.display, output: 'htmlAndMathml', throwOnError: false });
            });

            // 清空容器，准备排版
            document.getElementById('paper-container').innerHTML = '';
            
            // 将生成的 HTML 放入隐藏内存块中分解
            const hiddenDiv = document.createElement('div');
            hiddenDiv.innerHTML = html;
            
            // 初始化第一页
            createNewPage();
            
            // 逐个节点装填
            const nodes = Array.from(hiddenDiv.childNodes);
            for (let i = 0; i < nodes.length; i++) {
                appendNodeToPages(nodes[i]);
            }
        }

        /**
         * 更新样式参数（引入防抖，避免拖动滑块时疯狂重排）
         */
        function updateStyles() {
            const vals = {
                fz: document.getElementById('font-size').value,
                lh: document.getElementById('line-height').value,
                mt: document.getElementById('margin-top').value,
                mb: document.getElementById('margin-bottom').value,
                ml: document.getElementById('margin-left').value,
                mr: document.getElementById('margin-right').value
            };

            document.getElementById('font-size-val').innerText = vals.fz + 'px';
            document.getElementById('line-height-val').innerText = vals.lh;

            document.documentElement.style.setProperty('--paper-font-size', `${vals.fz}px`);
            document.documentElement.style.setProperty('--paper-line-height', vals.lh);
            document.documentElement.style.setProperty('--paper-margin-top', `${vals.mt}mm`);
            document.documentElement.style.setProperty('--paper-margin-bottom', `${vals.mb}mm`);
            document.documentElement.style.setProperty('--paper-margin-left', `${vals.ml}mm`);
            document.documentElement.style.setProperty('--paper-margin-right', `${vals.mr}mm`);

            printPageStyle.innerHTML = `@media print { @page { size: A4; margin: ${vals.mt}mm ${vals.mr}mm ${vals.mb}mm ${vals.ml}mm !important; } }`;

            // 样式改变会导致容量改变，需要重新计算分页
            clearTimeout(renderTimeout);
            renderTimeout = setTimeout(() => parseAndRender(editor.value), 400);
        }

        /**
         * 导出 Word 适配分页
         */
        function exportDOCX() {
            const mt = document.getElementById('margin-top').value;
            const mb = document.getElementById('margin-bottom').value;
            const ml = document.getElementById('margin-left').value;
            const mr = document.getElementById('margin-right').value;
            const fz = document.getElementById('font-size').value;
            const lh = document.getElementById('line-height').value;

            // 创建临时容器合并所有分页内容
            const tempDiv = document.createElement('div');
            document.querySelectorAll('.page-content').forEach(page => {
                Array.from(page.childNodes).forEach(node => {
                    tempDiv.appendChild(node.cloneNode(true));
                });
            });
            
            tempDiv.querySelectorAll('.katex-html').forEach(el => el.remove());
            tempDiv.querySelectorAll('.katex-display').forEach(el => {
                el.style.textAlign = "center";
                el.style.margin = "12pt 0";
            });

            const content = tempDiv.innerHTML;

            const html = `
                <html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'>
                <head>
                    <meta charset='utf-8'>
                    <!--[if gte mso 9]>
                    <xml><w:WordDocument><w:View>Print</w:View><w:Zoom>100</w:Zoom><w:DoNotOptimizeForBrowser/></w:WordDocument></xml>
                    <![endif]-->
                    <style>
                        @page Section1 { size: 595.3pt 841.9pt; margin: ${mt}mm ${mr}mm ${mb}mm ${ml}mm; mso-header-margin: 36pt; mso-footer-margin: 36pt; mso-paper-source: 0; }
                        div.Section1 { page: Section1; }
                        body { font-family: 'Times New Roman', serif; font-size: ${fz}px; line-height: ${lh}; }
                        h1 { font-size: 24pt; text-align: center; margin: 0 0 12pt 0; }
                        h2 { font-size: 18pt; margin: 12pt 0 6pt 0; border-bottom: 1px solid #ccc; }
                        p { margin: 0 0 8pt 0; text-align: justify; }
                        ul { margin: 0 0 10pt 20pt; }
                        li { mso-special-format: bullet; }
                    </style>
                </head>
                <body><div class="Section1">${content}</div></body>
                </html>
            `;

            const blob = new Blob(['\ufeff', html], { type: 'application/msword' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = '排版文档.doc'; 
            a.click();
        }

        /**
         * 导出 PDF：逐页 1:1 截取渲染，保证与预览绝对一致，并直接下载
         */
        async function exportPDF() {
            const btn = document.getElementById('export-btn');
            const originalText = btn.innerHTML;
            btn.disabled = true;

            try {
                // 等待最新的 DOM 更新稳定
                await new Promise(r => setTimeout(r, 100));
                
                const pages = document.querySelectorAll('.a4-page');
                const { jsPDF } = window.jspdf;
                // 'p' 纵向, 'mm' 单位, 'a4' 纸张标准尺寸
                const pdf = new jsPDF('p', 'mm', 'a4');

                for (let i = 0; i < pages.length; i++) {
                    const page = pages[i];
                    
                    btn.innerHTML = `处理中 ${i + 1}/${pages.length}...`;
                    
                    // 暂时移除阴影以保证截图纯净
                    const oldShadow = page.style.boxShadow;
                    page.style.boxShadow = 'none';
                    
                    // 强制采用 3 倍超高分辨率进行无损采样
                    const canvas = await html2canvas(page, { 
                        scale: 3, 
                        useCORS: true,
                        logging: false
                    });
                    
                    page.style.boxShadow = oldShadow;
                    
                    const imgData = canvas.toDataURL('image/jpeg', 0.98);
                    
                    // 除了第一页，之后的都要 addPage
                    if (i > 0) {
                        pdf.addPage();
                    }
                    
                    // 将高清图强行压入严格的 210x297 mm 的 PDF 页面中
                    pdf.addImage(imgData, 'JPEG', 0, 0, 210, 297);
                }

                // 直接触发文件下载行为
                pdf.save('排版文档.pdf');
                
            } catch (error) {
                console.error("PDF生成错误:", error);
                alert("生成 PDF 时发生错误，请重试。");
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }

        function downloadHtml() {
            document.getElementById('editor').textContent = editor.value;
            const blob = new Blob(["<!DOCTYPE html>\n" + document.documentElement.outerHTML], { type: 'text/html' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = '排版工具_多页版.html';
            a.click();
        }

        // 绑定带防抖的输入事件
        editor.addEventListener('input', () => {
            clearTimeout(renderTimeout);
            renderTimeout = setTimeout(() => parseAndRender(editor.value), 400);
        });

        window.addEventListener('DOMContentLoaded', () => { updateStyles(); parseAndRender(editor.value); });
    </script>
</body>
</html>
